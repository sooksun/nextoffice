services:
  # ─── Redis ───
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - nextoffice
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── MinIO (Object Storage) ───
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"   # MinIO Console
    networks:
      - nextoffice
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Qdrant (Vector DB) ───
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - nextoffice
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Face Recognition Service (Python/InsightFace) ───
  face-service:
    build:
      context: ./services/face-recognition
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MODEL_NAME: buffalo_l
      SIMILARITY_THRESHOLD: "0.45"
      EMBEDDINGS_DIR: /app/data/embeddings
    volumes:
      - face_data:/app/data
    networks:
      - nextoffice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── NestJS API ───
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=800 --expose-gc"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      FACE_SERVICE_URL: http://face-service:8500
    volumes:
      - vault_data:/app/vault
    ports:
      - "9911:3000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_started
      face-service:
        condition: service_healthy
    networks:
      - nextoffice

  # ─── Next.js Web ───
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_API_URL ยังคง bake ตอน build เพราะใช้ฝั่ง browser
        - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:9911}
        # NEXT_PUBLIC_GOOGLE_CLIENT_ID ถูกลบออกจาก build args แล้ว
        # ใช้ GOOGLE_CLIENT_ID runtime env แทน (อ่านใน Server Component login/layout.tsx)
    restart: unless-stopped
    env_file:
      - .env.production   # โหลด GOOGLE_CLIENT_ID และ config อื่นตอน runtime
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://api:3000
      # Override PORT จาก .env.production (api ใช้ 3000, web ต้องใช้ 3001)
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    ports:
      - "9910:3001"
    depends_on:
      - api
    networks:
      - nextoffice


volumes:
  redis_data:
  minio_data:
  qdrant_data:
  vault_data:
  face_data:

networks:
  nextoffice:
    driver: bridge
